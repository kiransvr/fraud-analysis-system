apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-backend
  template:
    metadata:
      labels:
        app: fraud-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/fraud-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: ML_SERVICE_BASE_URL
              value: http://fraud-ml-service:8001
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: fraud-db-secret
                  key: jdbcUrl
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fraud-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraud-db-secret
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-backend
spec:
  selector:
    app: fraud-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
