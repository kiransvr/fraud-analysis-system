name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend tests
        run: mvn -B test

  ml-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run ML tests
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build -- --configuration production

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test -- --watch=false --browsers=ChromeHeadless --no-progress

  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start stack
        working-directory: .
        env:
          ML_SERVICE_MAX_ATTEMPTS: "3"
          ML_SERVICE_RETRY_BACKOFF_MS: "50"
        run: docker compose -f deployment/docker-compose.yml up -d --build
      - name: Wait for backend readiness
        working-directory: .
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become ready in time"
          exit 1
      - name: Wait for frontend readiness
        working-directory: .
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4200 > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Frontend did not become ready in time"
          exit 1
      - name: Run Playwright smoke tests
        env:
          E2E_BASE_URL: http://localhost:4200
        run: npm run e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
      - name: Stop stack
        if: always()
        working-directory: .
        run: docker compose -f deployment/docker-compose.yml down --volumes

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose syntax
        run: docker compose -f deployment/docker-compose.yml config

